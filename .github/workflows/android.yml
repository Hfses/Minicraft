name: Android APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Backend URL baked into the app (EXPO_PUBLIC_API_URL)"
        required: false
        default: "https://crafttogether-hfses.fly.dev"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || 'https://crafttogether-hfses.fly.dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prebuild Android project
        working-directory: app
        run: npx expo prebuild --platform android --no-install

      - name: Use smaller Gradle distribution (faster, less flaky download)
        working-directory: app/android
        run: sed -i 's/-all.zip/-bin.zip/' gradle/wrapper/gradle-wrapper.properties

      - name: Pin Kotlin version (Compose compiler in expo-modules-core needs 1.9.25)
        working-directory: app/android
        run: |
          # expo-build-properties patches build.gradle during prebuild; this sed is a
          # dependency-free backup that rewrites any hardcoded 1.9.24 to 1.9.25.
          printf '\nandroid.kotlinVersion=1.9.25\n' >> gradle.properties
          sed -i 's/1\.9\.24/1.9.25/g' build.gradle || true
          echo "----- kotlinVersion references -----"
          grep -rn "1\.9\.2[45]" build.gradle gradle.properties || true

      - name: Build release APK (embeds the JS bundle — runs without Metro)
        working-directory: app/android
        run: |
          for attempt in 1 2 3; do
            echo "== gradle assembleRelease attempt $attempt =="
            ./gradlew assembleRelease --no-daemon --stacktrace && exit 0
            echo "attempt $attempt failed; retrying in 20s"
            sleep 20
          done
          echo "gradle build failed after 3 attempts"
          exit 1

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/android/app/build/outputs/apk/release/app-release.apk dist/CraftTogether.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CraftTogether-apk
          path: dist/CraftTogether.apk

      - name: Publish to a Release (permanent download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'apk-latest' }}
          name: CraftTogether APK
          body: |
            APK do CraftTogether para Android (release — roda sem Metro/PC).

            Como instalar:
            1. Baixe `CraftTogether.apk` abaixo.
            2. No celular, permita "instalar de fontes desconhecidas".
            3. Abra o APK e instale.

            Observacao: para criar/entrar em salas o backend precisa estar rodando e
            o app precisa apontar para ele (rode o workflow com o campo api_url).
          files: dist/CraftTogether.apk
          fail_on_unmatched_files: true
